<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Hexagon background -->
  <polygon points="50,4 93,27 93,73 50,96 7,73 7,27"
           fill="#000000" stroke="#00e5c3" stroke-width="3"/>
  <!-- ◈ symbol — outer diamond -->
  <polygon points="50,18 68,50 50,82 32,50"
           fill="none" stroke="#00e5c3" stroke-width="3"/>
  <!-- inner small square rotated -->
  <rect x="42" y="42" width="16" height="16" rx="2"
        fill="#00e5c3" transform="rotate(45,50,50)"/>
  <!-- center dot -->
  <circle cx="50" cy="50" r="4" fill="#000000"/>
</svg>
